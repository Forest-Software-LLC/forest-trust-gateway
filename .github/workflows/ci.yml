name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install (clean, from lockfile)
        run: npm ci

      - name: Typecheck + build both targets
        run: npm run build

      - name: Tests (fully offline — mocked internal API, no live services)
        run: npm test
