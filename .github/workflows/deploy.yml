name: Deploy

# The only path to production: every deploy of packages.forest.dev comes
# through this workflow, from this repo's main branch, with the logs and
# the attested container image digest public for anyone to inspect.
on:
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read
  id-token: write      # build provenance attestations
  attestations: write

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install (clean, from lockfile)
        run: npm ci

      - name: Typecheck + build both targets
        run: npm run build

      - name: Tests
        run: npm test

      # wrangler builds the container image from ./Dockerfile on this runner,
      # pushes it to Cloudflare's registry, and deploys the Worker. The image
      # digest it reports is captured for attestation below.
      - name: Deploy to Cloudflare
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -euo pipefail
          npx wrangler deploy 2>&1 | tee deploy.log
          DIGEST=$(grep -oE 'sha256:[a-f0-9]{64}' deploy.log | head -1)
          if [ -z "$DIGEST" ]; then
            echo "::warning::No image digest found in wrangler output; skipping attestation"
          fi
          echo "IMAGE_DIGEST=$DIGEST" >> "$GITHUB_ENV"

      # Cryptographic proof that the deployed container image was built by
      # this workflow from this commit — verifiable with `gh attestation
      # verify`. (GitHub only issues attestations for public repositories,
      # so this step is skipped while the repo is private.)
      - name: Attest container image provenance
        if: ${{ !github.event.repository.private && env.IMAGE_DIGEST != '' }}
        uses: actions/attest-build-provenance@v2
        with:
          subject-name: forest-trust-gateway-gatewaycontainer
          subject-digest: ${{ env.IMAGE_DIGEST }}
